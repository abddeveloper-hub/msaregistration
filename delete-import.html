<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Imported Attendance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        button { padding: 10px 20px; font-size: 16px; background: #dc3545; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #log { margin-top: 20px; padding: 10px; background: #f4f4f4; border: 1px solid #ccc; height: 200px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Undo Attendance Import</h2>
    <p>This script will search for and delete all attendance records that were automatically added by the import script.</p>
    
    <button id="deleteBtn" disabled>Checking authentication...</button>
    <button id="deleteAllBtn" disabled style="background: #8b0000; margin-left: 10px;">Wipe ALL Attendance (Start Fresh)</button>
    <div id="log"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const logEl = document.getElementById('log');
        const log = (msg) => {
            console.log(msg);
            logEl.innerHTML += msg + "<br>";
            logEl.scrollTop = logEl.scrollHeight;
        };

        let currentFacData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        currentFacData = docSnap.data();
                        log(`Authenticated as: ${currentFacData.fullName} (${currentFacData.role})`);
                        const btn = document.getElementById('deleteBtn');
                        btn.disabled = false;
                        btn.innerText = "Delete Imported Records";

                        const allBtn = document.getElementById('deleteAllBtn');
                        allBtn.disabled = false;
                    } else {
                        log("<span style='color:red'>Error: User profile not found.</span>");
                    }
                } catch (e) {
                    log(`<span style='color:red'>Auth Error: ${e.message}</span>`);
                }
            } else {
                log("<span style='color:red'>Not logged in! Please login to the portal first.</span>");
            }
        });

        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (!confirm("Are you sure you want to delete all attendance records marked by the script?")) return;
            
            const btn = document.getElementById('deleteBtn');
            btn.disabled = true;
            log("Starting deletion process...");

            try {
                let students = [];
                if (currentFacData.role === 'admin') {
                    const usersSnap = await getDocs(collection(db, "users"));
                    usersSnap.forEach(d => {
                        const data = d.data();
                        if ((data.role === 'student' || !data.role)) students.push(d.id);
                    });
                } else {
                    const campusScope = currentFacData.campusId || currentFacData.campus || currentFacData.campusName;
                    if (!campusScope) throw new Error("No campus assigned to this faculty.");
                    
                    const fields = ['campusId', 'campus', 'campusName'];
                    for (const field of fields) {
                        const q = query(collection(db, "users"), where(field, "==", String(campusScope)));
                        const snap = await getDocs(q);
                        snap.forEach(d => {
                            if (!students.includes(d.id)) students.push(d.id);
                        });
                    }
                }

                log(`Checking ${students.length} students for imported records...`);
                let recordsDeleted = 0;

                for (const studentId of students) {
                    // Find attendance records for this student
                    const attSnap = await getDocs(collection(db, `users/${studentId}/attendance`));
                    for (const attDoc of attSnap.docs) {
                        const data = attDoc.data();
                        if (data.markedBy === "import_script") {
                            await deleteDoc(doc(db, `users/${studentId}/attendance`, attDoc.id));
                            recordsDeleted++;
                        }
                    }
                }

                log(`Successfully deleted ${recordsDeleted} unwanted attendance records!`);
                log("Process complete. Your database is clean.");

            } catch (err) {
                log(`<span style="color:red">Error: ${err.message}</span>`);
            }
            btn.disabled = false;
        });

        document.getElementById('deleteAllBtn').addEventListener('click', async () => {
            if (!confirm("DANGER: Are you sure you want to completely WIPE ALL attendance records for all students? This cannot be undone!")) return;
            
            const btn = document.getElementById('deleteAllBtn');
            btn.disabled = true;
            log("<span style='color:red'>Starting COMPLETE wipe of all attendance...</span>");

            try {
                let students = [];
                if (currentFacData.role === 'admin') {
                    const usersSnap = await getDocs(collection(db, "users"));
                    usersSnap.forEach(d => {
                        const data = d.data();
                        if ((data.role === 'student' || !data.role)) students.push(d.id);
                    });
                } else {
                    const campusScope = currentFacData.campusId || currentFacData.campus || currentFacData.campusName;
                    if (!campusScope) throw new Error("No campus assigned to this faculty.");
                    
                    const fields = ['campusId', 'campus', 'campusName'];
                    for (const field of fields) {
                        const q = query(collection(db, "users"), where(field, "==", String(campusScope)));
                        const snap = await getDocs(q);
                        snap.forEach(d => {
                            if (!students.includes(d.id)) students.push(d.id);
                        });
                    }
                }

                log(`Checking ${students.length} students...`);
                let recordsDeleted = 0;

                for (const studentId of students) {
                    const attSnap = await getDocs(collection(db, `users/${studentId}/attendance`));
                    for (const attDoc of attSnap.docs) {
                        await deleteDoc(doc(db, `users/${studentId}/attendance`, attDoc.id));
                        recordsDeleted++;
                    }
                }

                log(`Successfully deleted ALL ${recordsDeleted} attendance records!`);
                log("Process complete. Your database is completely clean.");

            } catch (err) {
                log(`<span style="color:red">Error: ${err.message}</span>`);
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
