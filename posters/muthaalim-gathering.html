<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muthaalim Gathering Poster</title>
  <style>
    :root {
      --ink: #f9f2dc;
      --muted: #d6c18a;
      --gold: #c89f47;
      --green: #09251d;
      --deep: #03110e;
      --aqua: #70c5b4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101713;
      font-family: Georgia, "Times New Roman", serif;
    }

    .poster {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(3, 17, 14, 0.45), rgba(3, 17, 14, 0.94)),
        linear-gradient(135deg, rgba(112, 197, 180, 0.12), transparent 42%),
        url("../assets/mdu-hero.png") center / cover no-repeat,
        var(--green);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      isolation: isolate;
    }

    .poster::before,
    .poster::after {
      content: "";
      position: absolute;
      inset: 38px;
      border: 2px solid rgba(200, 159, 71, 0.62);
      pointer-events: none;
      z-index: 2;
    }

    .poster::after {
      inset: 62px;
      border-color: rgba(112, 197, 180, 0.26);
    }

    .glow {
      position: absolute;
      width: 620px;
      height: 620px;
      left: 50%;
      top: 118px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(200, 159, 71, 0.24), rgba(200, 159, 71, 0.06) 44%, transparent 68%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100%;
      padding: 96px 92px 82px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .bismillah {
      font-size: 34px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 88px;
    }

    .crest {
      width: 126px;
      height: 126px;
      display: grid;
      place-items: center;
      margin-bottom: 44px;
      border: 2px solid rgba(200, 159, 71, 0.72);
      transform: rotate(45deg);
      background: rgba(4, 30, 24, 0.5);
      box-shadow: 0 0 0 14px rgba(200, 159, 71, 0.08);
    }

    .crest span {
      transform: rotate(-45deg);
      font-size: 58px;
      line-height: 1;
      color: var(--gold);
    }

    .eyebrow {
      margin: 0 0 20px;
      color: var(--aqua);
      font-size: 28px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 860px;
      font-size: 100px;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-wrap: balance;
      text-shadow: 0 10px 36px rgba(0, 0, 0, 0.34);
    }

    .subtitle {
      max-width: 740px;
      margin: 34px 0 54px;
      color: #efe4c1;
      font-size: 35px;
      line-height: 1.32;
      text-wrap: balance;
    }

    .rule {
      width: 650px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-bottom: 58px;
      color: var(--gold);
      font-size: 24px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .rule::before,
    .rule::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, rgba(200, 159, 71, 0.85));
    }

    .rule::after {
      background: linear-gradient(90deg, rgba(200, 159, 71, 0.85), transparent);
    }

    .details {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: auto;
    }

    .detail {
      min-height: 168px;
      padding: 24px 20px;
      display: grid;
      align-content: center;
      gap: 13px;
      border: 1px solid rgba(214, 193, 138, 0.58);
      background: rgba(2, 14, 12, 0.46);
      backdrop-filter: blur(1px);
    }

    .detail strong {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 19px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--aqua);
    }

    .detail span {
      font-size: 28px;
      line-height: 1.18;
      color: var(--ink);
    }

    .venue {
      grid-column: 1 / -1;
      min-height: 136px;
    }

    .venue span {
      font-size: 34px;
    }

    .footer {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      margin-top: 46px;
      padding-top: 26px;
      border-top: 1px solid rgba(200, 159, 71, 0.42);
      font-family: Arial, Helvetica, sans-serif;
      color: #e8dab1;
      font-size: 24px;
      line-height: 1.3;
    }

    .footer .invite {
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footer .contact {
      text-align: right;
    }

    @media (max-width: 1100px) {
      body {
        zoom: calc(100vw / 1080);
      }
    }

    @media print {
      body {
        background: white;
      }

      .poster {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="Muthaalim Gathering event poster">
    <div class="glow"></div>
    <section class="content">
      <div class="bismillah">Bismillah</div>
      <div class="crest" aria-hidden="true"><span>٭</span></div>
      <p class="eyebrow">Special Program</p>
      <h1>Muthaalim Gathering</h1>
      <p class="subtitle">An evening of knowledge, reflection, dua, and community.</p>
      <div class="rule">Ilm  Tarbiyah  Unity</div>

      <div class="details" aria-label="Event details">
        <div class="detail">
          <strong>Date</strong>
          <span>Day, DD Month YYYY</span>
        </div>
        <div class="detail">
          <strong>Time</strong>
          <span>00:00 AM / PM</span>
        </div>
        <div class="detail">
          <strong>For</strong>
          <span>Muthaalim & Students</span>
        </div>
        <div class="detail venue">
          <strong>Venue</strong>
          <span>Masjid / Madrasa Hall, Your Area</span>
        </div>
      </div>

      <footer class="footer">
        <div class="invite">All are warmly invited</div>
        <div class="contact">Contact: +91 XXXXX XXXXX</div>
      </footer>
    </section>
  </main>
</body>
</html>
