<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live Stream | MSA UKKUDA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="icon" type="image/png" href="logo.png?v=2">
</head>
<body class="landing-page" style="background: var(--bg);">
    <header class="nav-wrapper">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand-lockup" href="index.html">
                <img src="logo.png?v=2" alt="MSA Ukkuda Logo" class="brand-logo-img">
                <span class="brand-text">
                    <strong style="font-family: 'Inter', sans-serif; letter-spacing: 0.08em; font-size: 1.25rem; line-height: 1; text-transform: uppercase; font-weight: 700;"><span class="brand-text-styled">Muhyissunnah Dars</span></strong>
                    <span style="letter-spacing: 0.15em;">Ukkuda Official Portal</span>
                </span>
            </a>
            <div class="nav-actions" style="position: relative;">
                <button class="btn btn-ghost icon-btn" id="loginMenuToggleBtn" type="button" title="Menu" aria-label="Open menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="12" cy="5" r="1.5"/>
                        <circle cx="12" cy="12" r="1.5"/>
                        <circle cx="12" cy="19" r="1.5"/>
                    </svg>
                </button>
                
                <div id="loginDropdownMenu" class="hidden">
                    <a href="index.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Home
                    </a>
                    <a href="library.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        Digital Library
                    </a>
                    <a href="events.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        News &amp; Events
                    </a>
                    <a href="gallery.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        Gallery
                    </a>
                    <a href="videos.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Videos
                    </a>
                    <a href="achievements.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                        Achievements
                    </a>
                    <a href="alumni.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                        Alumni Directory
                    </a>
                    <a href="login.html" class="btn btn-ghost" style="border-radius: 0; border: none; border-bottom: 1px solid var(--border); justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        Login
                    </a>
                    <a href="login.html?signup=true" class="btn btn-ghost" style="border-radius: 0; border: none; justify-content: flex-start; padding: 1rem; text-decoration: none; gap: 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        New Registration
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main id="mainContent" style="padding: 8rem 2rem 6rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <div style="max-width: 1000px; width: 100%; text-align: center;">
            <div id="liveStreamStatus" style="display: inline-block; padding: 0.5rem 1.5rem; background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 50px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem; margin-bottom: 1.5rem;">
                <img src="logo.png?v=2" alt="Logo" class="app-logo-img" style="width:16px; height:16px; animation: pulseLogo 2s infinite; margin-right:8px;"> Checking Status...
            </div>
            
            <h2 id="liveStreamTitle" style="font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; color: var(--text-main); margin-bottom: 3rem;">Live Stream</h2>
            
            <div id="liveStreamVideoContainer" class="portal-card" style="padding: 0; overflow: hidden; border-radius: 16px; display: none;">
                <iframe id="liveStreamIframe" width="100%" height="500" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display: block;"></iframe>
            </div>

            <div id="offlineMessage" style="display: none; padding: 4rem 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px;">
                <p style="color: var(--text-dim); font-size: 1.2rem;">There is no active live stream at the moment.</p>
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 0.5rem;">Please check our events page for upcoming schedules.</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusBadge = document.getElementById('liveStreamStatus');
        const titleEl = document.getElementById('liveStreamTitle');
        const videoContainer = document.getElementById('liveStreamVideoContainer');
        const iframe = document.getElementById('liveStreamIframe');
        const offlineMsg = document.getElementById('offlineMessage');

        onSnapshot(doc(db, 'settings', 'liveStream'), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.isLive && data.url) {
                    statusBadge.innerHTML = '<img src="logo.png?v=2" alt="Logo" class="app-logo-img" style="width:16px; height:16px; animation: pulseLogo 2s infinite; margin-right:8px;"> LIVE NOW';
                    statusBadge.style.color = '#ef4444';
                    statusBadge.style.borderColor = '#ef4444';
                    
                    titleEl.textContent = data.title || 'Live Stream';
                    iframe.src = data.url;
                    
                    videoContainer.style.display = 'block';
                    offlineMsg.style.display = 'none';
                } else {
                    showOffline();
                }
            } else {
                showOffline();
            }
        });

        function showOffline() {
            statusBadge.innerHTML = 'OFFLINE';
            statusBadge.style.color = 'var(--text-dim)';
            statusBadge.style.borderColor = 'var(--border)';
            statusBadge.style.background = 'transparent';
            
            titleEl.textContent = 'Live Stream Offline';
            iframe.src = '';
            
            offlineMsg.style.display = 'block';
        }

        const loginMenuToggleBtn = document.getElementById('loginMenuToggleBtn');
        const loginDropdownMenu = document.getElementById('loginDropdownMenu');
        if (loginMenuToggleBtn && loginDropdownMenu) {
            loginMenuToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                loginDropdownMenu.classList.toggle('hidden');
            });
            document.addEventListener('click', (e) => {
                if (!loginMenuToggleBtn.contains(e.target) && !loginDropdownMenu.contains(e.target)) {
                    loginDropdownMenu.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
