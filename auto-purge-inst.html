<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Auto Purge Institutions</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1rem; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #07110f; color: #f8f3e6; }
        main { width: min(100%, 420px); padding: 1.5rem; border: 1px solid rgba(232, 217, 172, 0.18); border-radius: 1rem; background: rgba(15, 26, 23, 0.9); }
        #status { margin-top: 1rem; overflow-wrap: anywhere; color: #b8c1b4; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <main>
        <h1>Purging Institutions...</h1>
        <div id="status">Starting...</div>
    </main>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8HJ3MD69rHz9opfiS3irqmbdfggKl0iQ",
            authDomain: "msa-registrtion.firebaseapp.com",
            projectId: "msa-registrtion",
            storageBucket: "msa-registrtion.firebasestorage.app",
            messagingSenderId: "312011015482",
            appId: "1:312011015482:web:4a56ddbccfcda4dbe57c03"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function purge() {
            const status = document.getElementById('status');
            try {
                const snap = await db.collection('institutions').get();
                if (snap.empty) {
                    status.innerText = "No institutions found.";
                    return;
                }
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                status.innerText = "Successfully deleted " + snap.size + " institutions.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }
        purge();
    </script>
</body>
</html>
